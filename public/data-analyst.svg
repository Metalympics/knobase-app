<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#2563EB"/>
  <!-- Bar chart icon -->
  <g fill="white">
    <!-- Bar 1 (short) -->
    <rect x="18" y="38" width="6" height="8" rx="1"/>
    <!-- Bar 2 (tall) -->
    <rect x="27" y="24" width="6" height="22" rx="1"/>
    <!-- Bar 3 (medium) -->
    <rect x="36" y="30" width="6" height="16" rx="1"/>
    <!-- Trend line -->
    <polyline points="18,36 24,28 32,22 42,26" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot on trend -->
    <circle cx="42" cy="26" r="2" fill="white"/>
  </g>
</svg>
